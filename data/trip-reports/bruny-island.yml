title: Bruny Island
start_date: 2026-03-06
end_date: 2026-03-09
description: |
    Long weekend trip with Jodie.

    Debut bird was a solitary flying Australiasian Gannet spotted from the Ferry
    to the island, prompty followed by Tasmanian Nativehen which were everywhere
    along the roads.

    We stayed on the south side of Adventure Bay, right next to the start of the
    Fluted Cape track. We hiked that Saturday morning, finding a flock of
    Yellow-Throated Honeyeaters and a colony of Black-faced Cormorants. Also a
    Dusky Robin, Tasmanian Scrubwen, and our first proper look at Green Rosella.

    A walk along Adventure Beach in the evening yielded Hooded Plover near their
    breeding ground. Also a large variety of other sea birds: Pied and Sooty
    Oystercatcher, Kelp and Pacific Gull, Crested Tern.

    No Little Penguin were to be found after dark at The Neck, but the
    Short-tailed Shearwater returning from their ocean feeding was absolutely
    breathtaking: hundreds zipping back and forth, silouetted against a late
    dusk sky. We went back the following night to experience it again, after
    enjoying a fantastic meal at Hotel Bruny.

    Sunday we joined a delightful tour led by Kat and Harriet at Inala Jurassic
    garden. We were rewarded with a decent look at the critically endangered
    Forty-spotted Pardalote, a flock of Strong-billed Honeyeater, and some
    Black-headed Honeyeater. Also a trio of raptor lifers: Collared Sparrowhawk,
    Brown Goshawk, and Grey Goshawk. Jodie spotted Tasmanian Thornbill but I
    didn't get a good look.

    While on the west side of the island we drove to the lighthouse, not
    expecting many birds but chancing upon a brilliant male Flame Robin.

    An attempt to twitch a Scrubtit at Mavista Nature Walk Monday morning
    instead led to a fantastic view of a Pink Robin. Afternoon visit to the
    quarantine station on the drive back to the Ferry was a little barren,
    though found a young Gray Butcherbird practicing its song and finally got a
    decent snap of Tasmanian Nativehen.

    Despite a last ditch attempt on the Tinderbox Track driving back to Hobart,
    and a last-minute fakeout by a Gray, we dipped on Black Currawong. All up I
    found nine of the twelve Tasmanian endemics, with Jodie ticking a tenth with
    her Tasmanian Thornbill spot.
